name: CI Main

on:
  push:
    branches: [main]

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://gyxcdrcdnnzjdmcrwbpr.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_L6rQNcyor04anYeEt9DJZg_u16hDoc5
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_L6rQNcyor04anYeEt9DJZg_u16hDoc5
          NEXT_PUBLIC_APP_URL: http://localhost:3003
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_DATA_BACKEND: supabase
          POS_API_URL: http://localhost:3000
          POS_API_KEY: ${{ secrets.POS_API_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Unit & integration tests
        run: pnpm test

  e2e-regression:
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        run: pnpm --filter meso-app exec playwright install chromium --with-deps

      - name: Run live sandbox E2E (Delivery -> P24 -> POS KDS)
        working-directory: apps/delivery
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://gyxcdrcdnnzjdmcrwbpr.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_DELIVERY_BASE_URL: https://order.mesofood.pl
          E2E_POS_BASE_URL: https://pos.mesofood.pl
          E2E_GATE_PASSWORD: ${{ secrets.E2E_GATE_PASSWORD }}
          E2E_P24_AUTOMATE: "1"
          E2E_P24_REDIRECT_TIMEOUT_MS: "180000"
        run: pnpm test:e2e:sandbox

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-sandbox-main-${{ github.run_id }}
          path: apps/delivery/test-results/
          retention-days: 7
