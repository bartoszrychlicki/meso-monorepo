name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages & apps
        env:
          # Public vars needed for delivery app SSR prerendering (safe to expose — embedded in client JS)
          NEXT_PUBLIC_SUPABASE_URL: https://gyxcdrcdnnzjdmcrwbpr.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_L6rQNcyor04anYeEt9DJZg_u16hDoc5
          NEXT_PUBLIC_APP_URL: http://localhost:3003
          # POS needs this for build
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium only)
        run: pnpm --filter meso-app exec playwright install chromium --with-deps

      - name: Run cross-app E2E tests
        env:
          # Shared Supabase config (public — safe to expose)
          NEXT_PUBLIC_SUPABASE_URL: https://gyxcdrcdnnzjdmcrwbpr.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_L6rQNcyor04anYeEt9DJZg_u16hDoc5
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_L6rQNcyor04anYeEt9DJZg_u16hDoc5
          NEXT_PUBLIC_APP_URL: http://localhost:3003
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          # POS backend mode
          NEXT_PUBLIC_DATA_BACKEND: supabase
          # POS ↔ Delivery communication
          POS_API_URL: http://localhost:3000
          # Secrets (set in GitHub repo settings → Secrets)
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          POS_API_KEY: ${{ secrets.POS_API_KEY }}
        working-directory: apps/delivery
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/delivery/test-results/
          retention-days: 7
