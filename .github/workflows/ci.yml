name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages & apps
        env:
          # Public vars needed for delivery app SSR prerendering (safe to expose — embedded in client JS)
          NEXT_PUBLIC_SUPABASE_URL: https://gyxcdrcdnnzjdmcrwbpr.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_L6rQNcyor04anYeEt9DJZg_u16hDoc5
          NEXT_PUBLIC_APP_URL: http://localhost:3003
          # POS needs this for build
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test
